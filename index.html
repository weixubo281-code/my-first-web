    // --- STREAMING_CHUNK:Implementing FadingVideo (Strict Specs Custom JS Crossfade) ---
    const FadingVideo = ({ src, className, style }) => {
      const videoRef = React.useRef(null);
      const rAFId = React.useRef(null);
      const fadingOutRef = React.useRef(false);

      // Custom fadeTo utilizing requestAnimationFrame reading style.opacity directly
      const fadeTo = (target, duration) => {
        if (rAFId.current) {
          cancelAnimationFrame(rAFId.current);
        }
        
        const video = videoRef.current;
        if (!video) return;

        // Reads current opacity directly from video element style, defaults to 0
        const startOpacity = parseFloat(video.style.opacity) || 0;
        const startTime = performance.now();

        const step = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const currentOpacity = startOpacity + (target - startOpacity) * progress;
          
          video.style.opacity = currentOpacity.toFixed(3);

          if (progress < 1) {
            rAFId.current = requestAnimationFrame(step);
          }
        };

        rAFId.current = requestAnimationFrame(step);
      };

      React.useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        // Set initial state
        video.style.opacity = "0";

        const handleLoadedData = () => {
          video.style.opacity = "0";
          video.play().catch(err => console.log("Auto-play blocked or interrupted:", err));
          fadeTo(1, 500);
        };

        const handleTimeUpdate = () => {
          const duration = video.duration;
          const currentTime = video.currentTime;
          
          // Trigger fade out 0.55s before video ends
          if (duration && !fadingOutRef.current) {
            const timeLeft = duration - currentTime;
            if (timeLeft <= 0.55 && timeLeft > 0) {
              fadingOutRef.current = true;
              fadeTo(0, 500);
            }
          }
        };

        const handleEnded = () => {
          // Fade complete or forced; schedule reset and play
          video.style.opacity = "0";
          setTimeout(() => {
            if (!videoRef.current) return;
            videoRef.current.currentTime = 0;
            videoRef.current.play().catch(err => console.log("Loop play interrupted:", err));
            fadingOutRef.current = false;
            fadeTo(1, 500);
          }, 100);
        };

        video.addEventListener('loadeddata', handleLoadedData);
        video.addEventListener('timeupdate', handleTimeUpdate);
        video.addEventListener('ended', handleEnded);

        // Fallback check if already loaded
        if (video.readyState >= 2) {
          handleLoadedData();
        }

        return () => {
          if (rAFId.current) {
            cancelAnimationFrame(rAFId.current);
          }
          video.removeEventListener('loadeddata', handleLoadedData);
          video.removeEventListener('timeupdate', handleTimeUpdate);
          video.removeEventListener('ended', handleEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          className={className}
          style={{ ...style, transition: 'none' }}
          autoPlay
          muted
          playsInline
          preload="auto"
        />
      );
    };

    // --- STREAMING_CHUNK:Implementing BlurText Component (Word-by-word visibility blur) ---
    const BlurText = ({ text }) => {
      const elementRef = React.useRef(null);
      const [isVisible, setIsVisible] = React.useState(false);

      React.useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.intersectionRatio >= 0.10) {
            setIsVisible(true);
            observer.unobserve(entry.target);
          }
        }, { threshold: 0.10 });

        if (elementRef.current) {
          observer.observe(elementRef.current);
        }

        return () => observer.disconnect();
      }, []);

      const words = text.split(" ");

      return (
        <span 
          ref={elementRef}
          className="flex flex-wrap justify-center" 
          style={{ rowGap: '0.1em' }}
        >

            return (

                key={index}
                initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
                animate={isVisible ? {
                  filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                  opacity: [0, 0.5, 1],
                  y: [50, -5, 0]
                } : {}}
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: delay
                }}
                className="inline-block"
                style={{ marginRight: '0.28em' }}
              >
                {word}
              </motion.span>
            );
          })}
        </span>
      );
    };
